<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة إدارة الطلاب</title>

  <!-- Cairo Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styleRegistrations.css">
</head>

<body>

  <div class="dashboard-card">

    <div class="table-controls">
      <button class="add-btn">+ إضافة طالب</button>

      <select class="filter-select">
        <option>كل المستويات</option>
        <option>الأولى ثانوي</option>
        <option>الثانية ثانوي</option>
      </select>

      <div class="search-box">
        <input type="text" placeholder="بحث عن طالب...">
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>الصورة الوصل</th>
            <th>الاسم</th>
            <th>الهاتف</th>
            <th>المستوى</th>
            <th>الإجراءات</th>
          </tr>
        </thead>
        <tbody>

        </tbody>
      </table>
    </div>

    <!-- Mobile Cards -->
    <div class="mobile-cards">
      <div class="student-card">
        <h4>أحمد علي</h4>
        <div class="student-info">الثالثة ثانوي — نشط</div>
        <div class="actions">
          <button class="btn btn-edit">✏ تعديل</button>
          <button class="btn btn-delete">🗑</button>
        </div>
      </div>
    </div>

  </div>
  <div id="imageModal" class="image-modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modalImage">
  </div>
  <script src="registScript.js"></script>
</body>

</html>
